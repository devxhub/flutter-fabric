name: flutter_fabric
description: >-
  A Flutter canvas library inspired by Fabric.js — interactive, selectable,
  draggable, scalable, and rotatable objects on a canvas with free drawing,
  JSON serialization, and SVG path support.
version: 0.0.1
homepage: https://github.com/devxhub/flutter-fabric
repository: https://github.com/devxhub/flutter-fabric
issue_tracker: https://github.com/devxhub/flutter-fabric/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
